<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta Request</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
      overflow: hidden;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .splash-window {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 30px;
      background: radial-gradient(circle, rgba(243, 156, 18, 0.3) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .logo {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 26px;
      z-index: 1;
      filter: drop-shadow(0 8px 32px rgba(243, 156, 18, 0.35));
    }

    .app-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fade-in 0.8s ease-out 0.3s forwards;
    }

    .loader {
      display: flex;
      gap: 8px;
      opacity: 0;
      animation: fade-in 0.8s ease-out 0.6s forwards;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f39c12;
    }

    .loader-dot:nth-child(1) {
      animation: bounce 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) {
      animation: bounce 1.4s ease-in-out 0.2s infinite;
    }

    .loader-dot:nth-child(3) {
      animation: bounce 1.4s ease-in-out 0.4s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-window">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <img class="logo" src="/apple-touch-icon.png" alt="Insta Request" />
    </div>
    <div class="app-name">Insta Request</div>
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>
</body>
</html>
